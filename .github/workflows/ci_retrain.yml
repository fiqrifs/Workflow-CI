name: CI Retrain Model

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy matplotlib seaborn

      - name: Run MLflow Project
        run: |
          python -m mlflow run MLProject/ \
            --env-manager local \
            --experiment-name CI_Retrain \
            -P max_depth=None \
            -P n_estimators=100

      - name: Get model path
        run: |
          MODEL_PATH=$(find . -name "MLmodel" | grep "artifacts/model" | head -n 1 | xargs -r dirname)
          if [ -z "$MODEL_PATH" ]; then
            echo "❌ MLmodel tidak ditemukan! Struktur direktori:"
            find . -name "MLmodel" 2>/dev/null || echo "Tidak ada MLmodel"
            exit 1
          fi
          echo "✅ Model path: $MODEL_PATH"
          echo "MODEL_PATH=$MODEL_PATH" >> $GITHUB_ENV

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image
        run: |
          python -m mlflow models build-docker \
            -m "${{ env.MODEL_PATH }}" \
            -n "${{ secrets.DOCKER_USERNAME }}/weather-retraining:latest"

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/weather-retraining:latest